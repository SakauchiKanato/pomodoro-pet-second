name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pillow pyinstaller

    - name: Build with PyInstaller Spec
      run: |
        # 💡 スクリプト直接ではなく、用意した指示書ファイル (.spec) を指定して確実にビルドさせます
        pyinstaller pomodoro_pet.spec

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-PomodoroPet
        path: dist/pomodoro_pet/

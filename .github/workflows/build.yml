name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install PyQt6 pillow pyinstaller

    - name: Build with PyInstaller
      # 💡 個別のファイル名ではなく「カレントディレクトリ全体（.）」を丸ごと投げ込むことで、タイポによるビルド停止を完全に防ぎます
      run: |
        pyinstaller --onedir --noconsole --add-data ".;." pomodoro_pet.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-PomodoroPet
        path: dist/pomodoro_pet/

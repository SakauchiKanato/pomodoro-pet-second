name: Build Windows Executable

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

  steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # 💡 PyQt6のビルドエラーを防ぐため、安全性の高い pyinstaller のバージョンを明示指定します
        pip install PyQt6 pillow pyinstaller==6.3.0

    - name: Build with PyInstaller
      run: |
        # 💡 PyQt6の内部システム（プラグインやDLL）を漏れなくEXEに同梱させるため、--collect-all PyQt6 を追加します
        pyinstaller --onedir --noconsole --collect-all PyQt6 --add-data "Focused_Corgi.png;." --add-data "Focused_Corgi_2.png;." --add-data "Focused_Corgi_3.png;." --add-data "Focused_Corgi_4.png;." --add-data "Hungry_Corgi.png;." --add-data "Hungry_Corgi_2.png;." --add-data "Hungry_Corgi_3.png;." --add-data "Hungry_Corgi_4.png;." --add-data "Satisfaction_Corgi.png;." pomodoro_pet.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Windows-PomodoroPet
        path: dist/pomodoro_pet/
